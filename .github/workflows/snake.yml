name: Generate Snake Animation

on:
schedule:
- cron: "0 0 * * *"
workflow_dispatch:

permissions:
contents: write
pages: write
id-token: write

jobs:
generate:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Generate Snake
    uses: Platane/snk@v3
    with:
      github_user_name: shibchandan
      outputs: |
        dist/github-contribution-grid-snake.svg
        dist/github-contribution-grid-snake-dark.svg?palette=github-dark

  - name: Deploy
    uses: JamesIves/github-pages-deploy-action@v4
    with:
      branch: output
      folder: dist
```
